stages: [lint, test, build, deploy]

variables:
  IMAGE_BACK: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  IMAGE_FRONT: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA

lint:backend:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff==0.6.8
    - ruff check backend/

lint:frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend && npm install && npm run lint

test:backend:
  stage: test
  image: python:3.11-slim
  script:
    - cd backend
    - pip install -r requirements-dev.txt
    # Les tests tournent sur SQLite en memoire : aucun appel reseau, aucune BDD externe
    - pytest
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml

build:images:
  stage: build
  image: docker:27
  services: [docker:27-dind]
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t $IMAGE_BACK ./backend
    - docker build -t $IMAGE_FRONT ./frontend
    - docker push $IMAGE_BACK
    - docker push $IMAGE_FRONT
  only: [main]

deploy:production:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    # Rollback : l'image precedente reste taguee, il suffit de rejouer le compose avec l'ancien SHA
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST
        "cd /srv/potagerconnect && export TAG=$CI_COMMIT_SHORT_SHA && docker compose pull && docker compose up -d"
  environment:
    name: production
    url: https://potagerconnect.example.fr
  only: [main]
  when: manual
